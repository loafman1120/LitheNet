name: Flutter

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

env:
  SINGBOX_FFI_REPO: loafman1120/singbox-ffi

jobs:
  desktop:
    name: ${{ matrix.name }} Flutter
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-2025
            platform: windows
            artifact: lithenet-windows-debug
            upload_path: LitheNet/build/windows/x64/runner/Debug/**
          - name: Linux
            os: ubuntu-latest
            platform: linux
            artifact: lithenet-linux-debug
            upload_path: LitheNet/build/linux/x64/debug/bundle/**
          - name: macOS
            os: macos-latest
            platform: macos
            artifact: lithenet-macos-debug
            upload_path: LitheNet/build/macos/Build/Products/Debug/lithenet.app/**

    steps:
      - name: Checkout LitheNet
        uses: actions/checkout@v4
        with:
          path: LitheNet

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable desktop target
        working-directory: LitheNet
        run: flutter config --enable-${{ matrix.platform }}-desktop

      - name: Pub get
        working-directory: LitheNet
        run: flutter pub get

      - name: Download and stage singbox-ffi plugin artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: LitheNet
        run: ./scripts/download_core_desktop.ps1 -Platform "${{ matrix.platform }}" -Repo "${env:SINGBOX_FFI_REPO}"

      - name: Analyze
        working-directory: LitheNet
        run: flutter analyze

      - name: Test
        working-directory: LitheNet
        run: flutter test

      - name: Build ${{ matrix.name }} debug
        working-directory: LitheNet
        run: flutter build ${{ matrix.platform }} --debug

      - name: Upload LitheNet ${{ matrix.name }} app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.upload_path }}
          if-no-files-found: error

      - name: Upload downloaded singbox-ffi ${{ matrix.name }} core
        uses: actions/upload-artifact@v4
        with:
          name: lithenet-singboxffi-${{ matrix.platform }}-core
          path: |
            LitheNet/native/singboxffi/**
          if-no-files-found: error
