name: Build LitheNet

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Windows runner
        run: flutter create --platforms windows .

      - name: Get dependencies
        run: flutter pub get

      - name: Download singbox-ffi shared core
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: pwsh scripts/download_core_windows.ps1

      - name: Build Windows app
        run: flutter build windows

      - name: Copy native core beside executable
        shell: pwsh
        run: |
          Copy-Item native/windows/singboxffi.dll build/windows/x64/runner/Release/singboxffi.dll -Force

      - uses: actions/upload-artifact@v4
        with:
          name: lithenet-windows-x64
          path: build/windows/x64/runner/Release/**
          if-no-files-found: error
